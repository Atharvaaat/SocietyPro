name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub Pages serves static files as-is from the /frontend directory.
      # Replace placeholder values in supabase.js with GitHub Secrets.
      - name: Inject Supabase credentials
        run: |
          sed -i "s|https://YOUR_PROJECT_ID.supabase.co|${{ secrets.SUPABASE_URL }}|g" frontend/lib/supabase.js
          sed -i "s|YOUR_ANON_KEY|${{ secrets.SUPABASE_ANON_KEY }}|g"              frontend/lib/supabase.js
          sed -i "s|https://YOUR_BACKEND.onrender.com|${{ secrets.BACKEND_URL }}|g" frontend/lib/supabase.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
