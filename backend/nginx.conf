# Nginx config for SocietyPro backend on home server
# Place at: /etc/nginx/sites-available/societypro
# Enable with: sudo ln -s /etc/nginx/sites-available/societypro /etc/nginx/sites-enabled/
# Get HTTPS cert: sudo certbot --nginx -d home.yourdomain.com

server {
    listen 80;
    server_name home.yourdomain.com;  # ← replace with your domain

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name home.yourdomain.com;  # ← replace with your domain

    # Let's Encrypt certificates (certbot fills these in automatically)
    ssl_certificate     /etc/letsencrypt/live/home.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/home.yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "DENY"            always;
    add_header X-Content-Type-Options "nosniff"         always;
    add_header Referrer-Policy        "no-referrer"     always;

    # Only expose /api/* and /health — block everything else
    location ~ ^/(api|health) {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;

        # Body size limit (email/SMS payloads are small)
        client_max_body_size 64k;
    }

    # Block all other paths
    location / {
        return 404;
    }
}
